<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register an account on CareerLaunch Hub.">
  <title>Register | CareerLaunch Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading-screen" class="loading-screen">
    <div class="loader"></div>
    <p class="loader-text">Loading...</p>
  </div>

  <div class="auth-wrapper">
    <div class="hero-bg"></div>
    <div class="hero-grid"></div>

    <div class="glass-card auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">🚀</div>
        <span>CareerLaunch Hub</span>
      </div>

      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Start mastering interviews and optimizing your resume</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name" required autocomplete="name">
          <span class="error-message" id="fullname-error"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email address" required autocomplete="email">
          <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
          <span class="error-message" id="username-error"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
            <button type="button" class="password-toggle-btn" id="toggle-pwd-1" aria-label="Toggle password visibility">👁️</button>
          </div>
          <div class="password-strength-bar"><div class="password-strength-fill" id="strength-bar-fill"></div></div>
          <span class="password-strength-text" id="strength-text">Password Strength: None</span>
          <span class="error-message" id="password-error"></span>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="confirm-password" placeholder="Confirm your password" required autocomplete="new-password">
            <button type="button" class="password-toggle-btn" id="toggle-pwd-2" aria-label="Toggle password visibility">👁️</button>
          </div>
          <span class="error-message" id="confirm-password-error"></span>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Create Account →</button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html" class="form-link">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/authentication.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirm-password');
      const strengthBarFill = document.getElementById('strength-bar-fill');
      const strengthText = document.getElementById('strength-text');

      // Password visibility toggles
      document.getElementById('toggle-pwd-1').addEventListener('click', (e) => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        e.target.textContent = type === 'password' ? '👁️' : '🙈';
      });

      document.getElementById('toggle-pwd-2').addEventListener('click', (e) => {
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
        e.target.textContent = type === 'password' ? '👁️' : '🙈';
      });

      // Password strength validation in real-time
      passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let score = 0;

        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        let pct = (score / 4) * 100;
        let color = '#ef4444'; // Red
        let label = 'Weak';

        if (score === 0) {
          pct = 0;
          label = 'None';
        } else if (score === 2) {
          color = '#f59e0b'; // Orange
          label = 'Moderate';
        } else if (score === 3) {
          color = '#818cf8'; // Medium Indigo
          label = 'Strong';
        } else if (score === 4) {
          color = '#10b981'; // Green
          label = 'Excellent';
        }

        strengthBarFill.style.width = pct + '%';
        strengthBarFill.style.backgroundColor = color;
        strengthText.textContent = 'Password Strength: ' + label;
        strengthText.style.color = color;
      });

      // Handle Submit
      const registerForm = document.getElementById('register-form');
      registerForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim();
        const username = document.getElementById('username').value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        // Reset errors
        document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

        let hasError = false;

        // Validations
        if (!fullname) {
          document.getElementById('fullname-error').textContent = 'Full name is required';
          hasError = true;
        }

        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          document.getElementById('email-error').textContent = 'Enter a valid email address';
          hasError = true;
        }

        if (!username || username.length < 3) {
          document.getElementById('username-error').textContent = 'Username must be at least 3 characters';
          hasError = true;
        }

        // Password validation
        if (password.length < 8) {
          document.getElementById('password-error').textContent = 'Password must be at least 8 characters long';
          hasError = true;
        } else if (!/[A-Z]/.test(password) || !/[0-9]/.test(password) || !/[^A-Za-z0-9]/.test(password)) {
          document.getElementById('password-error').textContent = 'Password must include uppercase, number, and special character';
          hasError = true;
        }

        if (password !== confirmPassword) {
          document.getElementById('confirm-password-error').textContent = 'Passwords do not match';
          hasError = true;
        }

        if (hasError) return;

        const result = Auth.register(fullname, email, username, password);

        if (result.success) {
          App.showToast('Account created successfully! Welcome aboard 🚀', 'success');
          
          // Trigger confetti celebrating registration
          setTimeout(() => {
            App.launchConfetti();
          }, 400);

          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } else {
          App.showToast(result.message, 'error');
          if (result.message.toLowerCase().includes('username')) {
            document.getElementById('username-error').textContent = result.message;
          } else {
            document.getElementById('email-error').textContent = result.message;
          }
        }
      });
    });
  </script>
</body>
</html>
